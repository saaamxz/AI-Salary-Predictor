<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body, .main-dashboard-content {
            background-color: #0b111e !important;
            color: #ffffff !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .dashboard-panel {
            background: linear-gradient(145deg, #0f192e, #13223f) !important;
            border: 2px solid #00f2fe !important;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.25) !important;
            border-radius: 16px !important;
            padding: 35px;
            width: 100%;
        }
        .panel-heading {
            color: #00f2fe !important;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            font-weight: bold;
        }
        .form-control {
            background-color: #070d19 !important;
            color: #ffffff !important;
            border: 1px solid #2c3e50 !important;
        }
        .form-control:focus {
            border-color: #00f2fe !important;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5) !important;
            background-color: #070d19 !important;
            color: #ffffff !important;
        }
        .btn-cyber-primary {
            background: linear-gradient(90deg, #00f2fe, #4facfe) !important;
            color: #070d19 !important;
            font-weight: bold !important;
            border: none !important;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4) !important;
            transition: all 0.3s ease !important;
            width: 100%;
        }
        .btn-cyber-primary:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.7) !important;
        }
    </style>
</head>
<body class="main-dashboard-content">
    <div class="container mt-5">
        <div class="dashboard-panel mx-auto" style="max-width: 600px;">
            <h3 class="panel-heading mb-4"><i class="fa-solid fa-brain"></i> AI Salary Predictor Model</h3>
            
            <form action="/" method="POST">
                <div class="mb-3">
                    <label class="form-label text-white">Years of Experience:</label>
                    <input type="number" name="experience" class="form-control" required min="0" max="40" value="{{ exp_value }}">
                </div>
                <div class="mb-3">
                    <label class="form-label text-white">Programming Rating (1-10):</label>
                    <input type="number" name="rating" class="form-control" required min="1" max="10" value="{{ rating_value }}">
                </div>
                <button type="submit" class="btn-cyber-primary">Execute Model & Predict</button>
            </form>

            {% if prediction %}
                <div class="mt-4 p-3 border border-info rounded text-center" style="background: rgba(0, 242, 254, 0.1); border-color: #00f2fe !important; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);">
                    <h5 class="text-info mb-1" style="text-shadow: 0 0 5px rgba(0, 242, 254, 0.5);">Model Output Result:</h5>
                    <p class="fs-4 fw-bold text-white mb-0">${{ prediction }} / Month</p>
                </div>
            {% endif %}


        </div> 
    </div> 
</body>
</html>
